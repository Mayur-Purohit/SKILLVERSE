services:
  - type: web
    name: skillverse
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn_config.py app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: skillverse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: skillverse-db
    databaseName: skillverse
    user: skillverse_user
