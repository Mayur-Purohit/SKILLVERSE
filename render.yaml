# ==========================================
# Render Blueprint Configuration
# This file optimizes your app for Render deployment
# ==========================================

services:
  - type: web
    name: skillverse
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn_config.py app:app
    
    # CRITICAL: Use paid tier for consistent performance
    # Free tier has cold starts (30-60 second delays after inactivity)
    plan: free  # Change to 'starter' ($7/mo) for no cold starts
    
    # Health check to keep the app responsive
    healthCheckPath: /
    
    # Environment variables for production
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: skillverse-db
          property: connectionString

# PostgreSQL Database (if not already created)
databases:
  - name: skillverse-db
    plan: free  # Change to 'starter' for better performance
    databaseName: skillverse
    user: skillverse_user
